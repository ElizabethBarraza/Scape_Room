name: Deploy Web Build

on:
  workflow_dispatch:

jobs:
  deploy-web:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Dar permisos de ejecución
        run: chmod +x devops/*.sh tests/*.sh

      - name: Preparar entorno
        run: ./devops/setup_env.sh

      - name: Validar proyecto
        run: ./devops/validate_project.sh

      - name: Ejecutar pruebas
        run: ./devops/run_tests.sh

      - name: Exportar versión web
        run: ./devops/export_game.sh web

      - name: Preparar despliegue
        run: ./devops/deploy_web.sh

      - name: Subir artefacto web
        uses: actions/upload-artifact@v4
        with:
          name: escape-room-web
          path: build/pages/