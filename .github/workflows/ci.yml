name: CI - Escape Room

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  validate-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Dar permisos de ejecución
        run: chmod +x devops/*.sh tests/*.sh

      - name: Preparar entorno
        run: ./devops/setup_env.sh

      - name: Validar proyecto
        run: ./devops/validate_project.sh

      - name: Ejecutar pruebas
        run: ./devops/run_tests.sh