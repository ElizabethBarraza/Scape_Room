name: Release Build - Escape Room

on:
  push:
    branches: [ main ]

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Dar permisos de ejecución
        run: chmod +x devops/*.sh tests/*.sh

      - name: Preparar entorno
        run: ./devops/setup_env.sh

      - name: Validar proyecto
        run: ./devops/validate_project.sh

      - name: Ejecutar pruebas
        run: ./devops/run_tests.sh

      - name: Exportar juego
        run: ./devops/export_game.sh desktop

      - name: Empaquetar build
        run: ./devops/package_build.sh

      - name: Subir artefacto
        uses: actions/upload-artifact@v4
        with:
          name: escape-room-build
          path: build/